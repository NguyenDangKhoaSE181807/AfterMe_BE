spring:
  config:
    import: optional:file:.env[.properties]

  application:
    name: reminder

  datasource:
    url: ${REMINDER_DB_URL}
    username: ${REMINDER_DB_USERNAME}
    password: ${REMINDER_DB_PASSWORD}
    driver-class-name: ${REMINDER_DB_DRIVER:org.postgresql.Driver}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: ${REMINDER_SERVER_PORT:8080}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

app:
  cors:
    allowed-origins: ${REMINDER_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
  security:
    jwt:
      issuer: ${REMINDER_JWT_ISSUER:https://idp.reminder.local/realms/main}
      audience: ${REMINDER_JWT_AUDIENCE:reminder-api}
      jwk-set-uri: ${REMINDER_JWT_JWK_SET_URI:}
      secret: ${REMINDER_JWT_SECRET:your-secret-key-min-32-chars-for-hmac-sha256-secure-token}
      access-token-ttl-seconds: ${REMINDER_ACCESS_TOKEN_TTL_SECONDS:900}
      refresh-token-ttl-seconds: ${REMINDER_REFRESH_TOKEN_TTL_SECONDS:1209600}
    kms:
      master-key-base64: ${REMINDER_KMS_MASTER_KEY_BASE64:MzIxQkUtREVWT1AtTUFTVEVSLUtFWQ==}
    secret-token:
      ttl-seconds: ${REMINDER_SECRET_TOKEN_TTL_SECONDS:60}
    rate-limit:
      window-seconds: ${REMINDER_RATE_LIMIT_WINDOW_SECONDS:60}
      max-requests-per-window: ${REMINDER_RATE_LIMIT_MAX_REQUESTS:20}
  notification:
    websocket:
      endpoint: /ws
      app-prefix: /app
      topic-prefix: /topic
    firebase:
      enabled: ${REMINDER_FIREBASE_ENABLED:false}
      service-account-path: ${REMINDER_FIREBASE_SERVICE_ACCOUNT_PATH:}
